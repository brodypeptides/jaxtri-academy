<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Jaxtri Command Center</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<header class="header">
  <a class="brand" href="owner-dashboard.html">Jaxtri Command Center</a>
  <nav class="nav">
    <a href="owner-dashboard.html">Dashboard</a>
    <a href="owner-recruitment.html">Recruitment</a>
    <a href="owner-admin.html">Admin</a>
    <a href="academy-dashboard.html">Academy</a>
    <button id="logout" class="btn">Logout</button>
  </nav>
</header>
<main class="dashboard">
  <p class="eyebrow">Owner access</p>
  <h1 class="title">Command center</h1>
  <div id="me" class="notice">Loading account...</div>

  <section class="dashgrid" style="margin-top:24px">
    <a class="card" href="owner-recruitment.html">
      <h2>Recruitment</h2>
      <p id="recruitmentCount">Loading applications...</p>
    </a>
    <a class="card" href="owner-admin.html">
      <h2>Direct Invites</h2>
      <p id="inviteCount">Loading invites...</p>
    </a>
    <a class="card" href="owner-admin.html">
      <h2>Admin</h2>
      <p>Create invite links from an email, manage active invites, and revoke access before activation.</p>
    </a>
  </section>
</main>
<script src="assets/session.js"></script><script src="assets/roster.js"></script>
<script>
async function loadCounts() {
  try {
    const r = await fetch('/api/admin/applications');
    const d = await r.json();
    if (r.ok) {
      const pending = d.applications.filter(a => a.status === 'pending' && !a.archived_at).length;
      const archived = d.applications.filter(a => a.archived_at).length;
      document.getElementById('recruitmentCount').textContent = `${pending} pending application${pending === 1 ? '' : 's'} waiting for review. ${archived} archived.`;
    }
  } catch {
    document.getElementById('recruitmentCount').textContent = 'Review affiliate applications.';
  }

  try {
    const r = await fetch('/api/admin/invites');
    const d = await r.json();
    if (r.ok) {
      const active = d.invites.filter(i => i.status === 'active' && !i.used_at).length;
      const direct = d.invites.filter(i => i.source === 'direct').length;
      document.getElementById('inviteCount').textContent = `${active} active invite${active === 1 ? '' : 's'}. ${direct} direct invite${direct === 1 ? '' : 's'} created.`;
      return;
    }
  } catch {}

  document.getElementById('inviteCount').textContent = 'Create direct invite links by email.';
}
loadCounts();
</script>
</body>
</html>
