<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Jaxtri Command Center</title><link rel="stylesheet" href="assets/styles.css"></head><body><header class="header"><a class="brand" href="owner-dashboard.html">Jaxtri Command Center</a><nav class="nav"><a href="owner-dashboard.html">Dashboard</a><a href="owner-recruitment.html">Recruitment</a><a href="owner-admin.html">Admin</a><a href="academy-dashboard.html">Academy</a><button id="logout" class="btn">Logout</button></nav></header><main class="dashboard"><p class="eyebrow">Owner access</p><h1 class="title">Command center</h1><div id="me" class="notice">Loading account...</div><section class="dashgrid" style="margin-top:24px"><a class="card" href="owner-recruitment.html"><h2>Recruitment</h2><p id="recruitmentCount">Loading applications...</p></a><div class="card"><h2>Users</h2><p>Invite managers and affiliates after approval.</p></div><div class="card"><h2>Admin</h2><p>Branding, security, roles, and system settings.</p></div></section></main><script src="assets/session.js"></script><script>async function loadCounts(){try{const r=await fetch('/api/admin/applications');const d=await r.json();if(!r.ok)return;const pending=d.applications.filter(a=>a.status==='pending').length;document.getElementById('recruitmentCount').textContent=`${pending} pending application${pending===1?'':'s'} waiting for review.`}catch(e){document.getElementById('recruitmentCount').textContent='Review affiliate applications.'}}loadCounts();</script></body></html>
