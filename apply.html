<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Apply | Jaxtri Labs Affiliate Program</title><link rel="stylesheet" href="assets/styles.css"><link rel="stylesheet" href="assets/public-soft-theme.css"></head><body class="public-soft"><header class="header"><a class="brand" href="index.html">Jaxtri Labs</a><nav class="nav"><a href="index.html">Home</a><a href="login.html">Login</a></nav></header><main class="hero"><section class="wrap grid"><div><p class="eyebrow">Affiliate application</p><h1 class="title">Apply to become a Jaxtri affiliate.</h1><p class="lead">Tell us who you are, where you create, and why you want to join. Approved affiliates receive private Academy access.</p><div id="status" class="notice">Applications are reviewed by the Jaxtri team.</div></div><form id="applicationForm" class="card form"><div class="split"><div class="field"><label>Full name</label><input name="full_name" required placeholder="Your name"></div><div class="field"><label>Email</label><input name="email" type="email" required placeholder="you@email.com"></div></div><div class="field"><label>Discord username</label><input name="discord_username" placeholder="username#0000 or @username"></div><div class="split"><div class="field"><label>TikTok</label><input name="tiktok" placeholder="@username or link"></div><div class="field"><label>Instagram</label><input name="instagram" placeholder="@username or link"></div></div><div class="field"><label>YouTube</label><input name="youtube" placeholder="Channel link"></div><div class="field"><label>Experience</label><select name="experience"><option value="New to affiliate marketing">New to affiliate marketing</option><option value="Less than 6 months">Less than 6 months</option><option value="6-12 months">6-12 months</option><option value="1-3 years">1-3 years</option><option value="3+ years">3+ years</option></select></div><div class="field"><label>Why do you
