<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Content Manager | Owner</title><link rel="stylesheet" href="../assets/styles.css"><script src="../assets/app.js" defer></script></head><body onload="Jaxtri.requireRole('owner')"><header class="topbar"><div class="wrap nav"><a class="brand" href="index.html"><img src="../assets/jaxtri-logo.png">Owner Dashboard</a><nav class="navlinks"><a href="applications.html">Applications</a><a href="content.html">Content Manager</a><a href="users.html">Users</a><a class="pill" onclick="Jaxtri.logout()">Logout</a></nav></div></header><main class="wrap"><section class="page-hero"><p class="eyebrow">Universal editor</p><h1>Create content without editing HTML.</h1><p>This owner CMS preview stores locally for now. Next step is connecting Cloudflare D1 so publishing is real.</p></section><form class="form-panel" onsubmit="Jaxtri.createContent(event)"><div class="form-grid"><div class="field"><label>Content type</label><select name="type"><option>Announcement</option><option>Training Lesson</option><option>Hook</option><option>Video Idea</option><option>Script</option><option>Caption/CTA</option><option>B-Roll Idea</option><option>Resource</option><option>Challenge</option></select></div><div class="field"><label>Status</label><select name="status"><option>Published</option><option>Draft</option><option>Testing</option><option>Archived</option></select></div><div class="field"><label>Title</label><input name="title" required placeholder="Example: 5 hooks for beginner creators"></div><div class="field"><label>Category</label><input name="category" placeholder="Hooks, TikTok, Training, etc."></div><div class="field full"><label>Body</label><textarea name="body" required placeholder="Write the post, lesson, hook, script, or resource description here."></textarea></div><div class="field full"><label>Tags</label><input name="tags" placeholder="beginner, tiktok, launch, a
