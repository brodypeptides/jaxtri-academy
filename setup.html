<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Setup Jaxtri Academy</title><link rel="stylesheet" href="assets/styles.css"><link rel="stylesheet" href="assets/frost-theme.css"></head><body><header class="header"><a class="brand" href="index.html">Jaxtri Setup</a><nav class="nav"><a href="index.html">Public Site</a><a href="login.html">Login</a></nav></header><main class="hero"><section class="wrap grid"><div><p class="eyebrow">First owner setup</p><h1 class="title">Create the first owner account.</h1><p class="lead">This page only works before an owner exists. Your account can have Owner access while your company title remains Manager.</p><div id="status" class="notice">Checking setup status...</div></div><form id="setupForm" class="card form"><div class="field"><label>Full name</label><input name="full_name" required placeholder="Brody Pluta"></div><div class="field"><label>Email</label><input name="email" type="email" required placeholder="brodypeptides@gmail.com"></div><div class="field"><label>Username</label><input name="username" required placeholder="brody"></div><div class="field"><label>Company title</label><input name="company_title" placeholder="Manager, Jaxtri Labs"></div><div class="field"><label>Password</label><input name="password" type="password" required minlength="8"></div><div class="field"><label>Confirm password</label><input name="confirm_password" type="password" required minlength="8"></div><button class="btn primary" type="submit">Create Academy</button></form></section></main><script>async function check(){const s=document.getElementById('status');try{const r=await fetch('/api/setup-status');const d=await r.json();if(d.initialized){s.className='notice error';s.textContent='This Academy is already initialized. Use Login instead.';document.getElementById('setupForm').style.display='none'}else{s.className='notice success';s.textContent='Ready. No owner account exists yet.'}}catch(e){s.className='notice error';s.textContent='Could not check setup status.'}}check();document.getElementById('setupForm').addEventListener('submit',async(e)=>{e.preventDefault();const form=Object.fromEntries(new FormData(e.target));const s=document.getElementById('status');if(form.password!==form.confirm_password){s.className='notice error';s.textContent='Passwords do not match.';return}const r=await fetch('/api/setup',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(form)});const d=await r.json().catch(()=>({error:'Unknown error'}));if(!r.ok){s.className='notice error';s.textContent=d.error||'Setup failed.';return}s.className='notice success';s.textContent='Owner created. Redirecting...';location.href=d.redirect||'/owner-dashboard.html'});</script></body></html>
