<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Setup · Jaxtri Academy</title><link rel="stylesheet" href="assets/styles.css"></head><body><header class="header"><a class="brand" href="index.html"><span class="mark">J</span><span>Jaxtri Setup</span></a></header><main class="page"><p class="eyebrow">Bootstrap owner</p><h1>Create the first owner account.</h1><p>This setup page only works when no owner exists in the database. After the first owner is created, setup is locked.</p><form id="setup-form" class="form"><div id="setup-msg" style="display:none"></div><div class="form-grid"><div class="field"><label>Name</label><input name="name" required></div><div class="field"><label>Email</label><input name="email" type="email" required></div><div class="field"><label>Username</label><input name="username" required></div><div class="field"><label>Password</label><input name="password" type="password" required minlength="10"></div><div class="field"><label>Confirm Password</label><input name="confirm_password" type="password" required minlength="10"></div></div><button class="btn primary" type="submit">Create Owner Account</button></form></main><script src="assets/app.js"></script></body></html>
