<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login | Jaxtri Academy</title><link rel="stylesheet" href="assets/styles.css"></head><body><header class="header"><a class="brand" href="index.html">Jaxtri Academy</a><nav class="nav"><a href="apply.html">Apply</a><a href="setup.html">Setup</a></nav></header><main class="hero"><section class="wrap grid"><div><p class="eyebrow">One login</p><h1 class="title">Login to your Jaxtri account.</h1><p>Owners, managers, and affiliates all use the same login. The system routes you based on your role.</p><div id="status" class="notice">Academy credentials are separate from GoAffPro.</div></div><form id="loginForm" class="card form"><div class="field"><label>Email or username</label><input name="identifier" required></div><div class="field"><label>Password</label><input name="password" type="password" required></div><label class="small"><input name="remember" type="checkbox"> Remember me</label><button class="btn primary" type="submit">Login</button></form></section></main><script>document.getElementById('loginForm').addEventListener('submit',async(e)=>{e.preventDefault();const s=document.getElementById('status');const r=await fetch('/api/login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(Object.fromEntries(new FormData(e.target)))});const d=await r.json().catch(()=>({error:'Unknown error'}));if(!r.ok){s.className='notice error';s.textContent=d.error||'Login failed.';return}s.className='notice success';s.textContent='Login successful. Redirecting...';location.href=d.redirect||'/academy-dashboard.html'});</script></body></html>
