<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Recruitment | Jaxtri Command Center</title><link rel="stylesheet" href="assets/styles.css"></head><body><header class="header"><a class="brand" href="owner-dashboard.html">Jaxtri Command Center</a><nav class="nav"><a href="owner-dashboard.html">Dashboard</a><a href="owner-recruitment.html">Recruitment</a><a href="owner-admin.html">Admin</a><button id="logout" class="btn">Logout</button></nav></header><main class="dashboard"><p class="eyebrow">Affiliate recruitment</p><h1 class="title">Review applications.</h1><div id="me" class="notice">Loading account...</div><div id="status" class="notice" style="margin-top:16px">Loading applications...</div><section id="summary" class="dashgrid" style="margin-top:24px"></section><section id="applications" class="list"></section></main><script src="assets/session.js"></script><script>
const appsEl=document.getElementById('applications');const statusEl=document.getElementById('status');const summaryEl=document.getElementById('summary');
function escapeHtml(s){return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[c]))}
function socials(a){return [['TikTok',a.tiktok],['Instagram',a.instagram],['YouTube',a.youtube]].filter(x=>x[1]).map(([k,v])=>`<p><strong>${k}:</strong> ${escapeHtml(v)}</p>`).join('')||'<p class="small">No socials provided.</p>'}
function card(a){return `<article class="card"><span class="pill ${escapeHtml(a.status)}">${escapeHtml(a.status)}</span><h2>${escapeHtml(a.full_name)}</h2><p><strong>Email:</strong> ${escapeHtml(a.email)}</p><p><strong>Discord:</strong> ${escapeHtml(a.discord_username||'Not provided')}</p><p><strong>Experience:</strong> ${escapeHtml(a.experience||'Not provided')}</p>${socials(a)}<p><strong>Why join:</strong></p><p>${escapeHtml(a.why_join)}</p><p class="small">Applied ${escapeHtml(a.created_at||'')}</p><div class="actions"><button class="btn primary" onclick="reviewApp(${a.id},'approve')" ${a.status==='approved'?'disabled':''}>Approve</button><button class="btn danger" onclick="reviewApp(${a.id},'reject')" ${a.status==='rejected'?'disabled':''}>Reject</button></div></article>`}
function counts(apps){const statuses=['pending','approved','rejected'];summaryEl.innerHTML=statuses.map(s=>{const n=apps.filter(a=>a.status===s).length;return `<div class="card"><h2>${n}</h2><p>${s[0].toUpperCase()+s.slice(1)}</p></div>`}).join('')}
async function loadApps(){statusEl.textContent='Loading applications...';const r=await fetch('/api/admin/applications');const d=await r.json().catch(()=>({error:'Unknown error'}));if(!r.ok){statusEl.className='notice error';statusEl.textContent=d.error||'Could not load applications.';return}counts(d.applications);if(!d.applications.length){statusEl.className='notice success';statusEl.textContent='No applications yet.';appsEl.innerHTML='';return}statusEl.className='notice success';statusEl.textContent=`${d.applications.length} application${d.applications.length===1?'':'s'} loaded.`;appsEl.innerHTML=d.applications.map(card).join('')}
async function reviewApp(id,action){const ok=confirm(`${action==='approve'?'Approve':'Reject'} this application?`);if(!ok)return;const r=await fetch(`/api/admin/applications/${id}/${action}`,{method:'POST'});const d=await r.json().catch(()=>({error:'Unknown error'}));if(!r.ok){alert(d.error||'Action failed.');return}await loadApps()}
loadApps();
</script></body></html>
